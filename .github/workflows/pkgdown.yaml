# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Adapted to use the modern GitHub Pages deployment actions
# (actions/upload-pages-artifact + actions/deploy-pages), matching the
# repository's Pages configuration (build_type: workflow).
#
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
    # Only rebuild the pkgdown site when files that actually affect the
    # site change. Commits that only touch script/ (benchmarks), dev/
    # (experiments), plans/, specs/, submit_v090_cloud/, tests/, or
    # data-raw/ don't rebuild, saving GitHub Actions minutes. Use
    # workflow_dispatch to force a rebuild manually.
    paths:
      - 'R/**'
      - 'vignettes/**'
      - 'man/**'
      - 'README.md'
      - 'NEWS.md'
      - 'DESCRIPTION'
      - 'NAMESPACE'
      - '_pkgdown.yml'
      - 'pkgdown/**'
      - '.github/workflows/pkgdown.yaml'
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

# Permissions required for the modern GitHub Pages deployment path.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but do not cancel in-progress runs
# as we want to let production deployments complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  pkgdown:
    # Skip on pull_request events: the job attaches to the github-pages
    # environment (line below), which has a protection rule allowing only
    # main to deploy. That check fires BEFORE any step runs, so PR runs
    # always fail at the environment gate even though the deploy steps
    # themselves are conditionally skipped on PRs. Skipping the whole job
    # on PRs avoids the spurious red X. Build-on-PR can be re-added as a
    # separate job if/when we want PR authors to see "did pkgdown build?".
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      # igraph is pulled in transitively and needs libglpk at load time;
      # without libglpk40 on the runner pkgdown fails with
      # "libglpk.so.40: cannot open shared object file".
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libglpk40 libglpk-dev

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # Install only hard dependencies (Depends/Imports/LinkingTo) of the
      # local package, plus pkgdown. Skipping Suggests is essential because
      # pigauto's Suggests list includes BACE, which is an in-tree sibling
      # package (BACE/) not available on CRAN. knitr + rmarkdown are still
      # installed transitively because pkgdown Imports rmarkdown which
      # Imports knitr.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website
          dependencies: '"hard"'

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        if: github.event_name != 'pull_request'
        uses: actions/deploy-pages@v4
