url: https://itchyshin.github.io/pigauto

destination: docs

template:
  bootstrap: 5
  bslib:
    primary: "#059669"
    base_font: {google: "Inter"}
    heading_font: {google: "Inter"}
    code_font: {google: "JetBrains Mono"}

home:
  title: "pigauto: phylogenetic trait imputation with a residual graph autoencoder"
  description: >
    Impute missing species trait data by blending a Brownian-motion baseline
    with an attention-based graph neural network correction. Handles
    continuous, binary, categorical, ordinal, and count traits in a single
    latent space, with conformal prediction intervals and multiple-imputation
    support for downstream inference.
  links:
    - text: Documentation index (DOCS.md)
      href: https://github.com/itchyshin/pigauto/blob/main/DOCS.md
    - text: Source code
      href: https://github.com/itchyshin/pigauto
    - text: Report a bug
      href: https://github.com/itchyshin/pigauto/issues

navbar:
  structure:
    left:  [intro, articles, reference, news]
    right: [search, github]
  components:
    intro:
      text: Get started
      href: articles/getting-started.html
    articles:
      text: Articles
      menu:
        - text: "Knitted vignettes"
        - text: "Getting started"
          href: articles/getting-started.html
        - text: "Mixed-type traits"
          href: articles/mixed-types.html
        - text: "-------"
        - text: "Walk-throughs"
        - text: "Intro (architecture overview)"
          href: pigauto_intro.html
        - text: "Mixed-type workflow (Paths A / B / C)"
          href: pigauto_workflow_mixed.html
        - text: "-------"
        - text: "Benchmarks"
        - text: "Scaling to 10,000 tips"
          href: dev/scaling.html
        - text: "AVONET missingness sweep (20/50/80%)"
          href: dev/bench_avonet_missingness.html
        - text: "pigauto vs TabPFN"
