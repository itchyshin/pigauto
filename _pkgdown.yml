url: https://itchyshin.github.io/pigauto

destination: docs

template:
  bootstrap: 5
  bslib:
    primary: "#059669"
    base_font: {google: "Inter"}
    heading_font: {google: "Inter"}
    code_font: {google: "JetBrains Mono"}

home:
  title: "pigauto: fill in missing species traits using a phylogenetic tree"
  description: >
    pigauto imputes missing trait data for comparative analyses by
    combining phylogenetic similarity (closely related species share
    similar traits) with cross-trait correlations (observed traits
    inform missing ones). It handles continuous measurements, counts,
    binary variables, ordered categories, and unordered categories in
    a single call. Uncertainty is quantified via conformal prediction
    intervals and Rubin's-rules multiple imputation. Tested up to
    10,000 species on a laptop.
  links:
    - text: Documentation index (DOCS.md)
      href: https://github.com/itchyshin/pigauto/blob/main/DOCS.md
    - text: Source code
      href: https://github.com/itchyshin/pigauto
    - text: Report a bug
      href: https://github.com/itchyshin/pigauto/issues

